# Smithery configuration file: https://smithery.ai/docs/config#smitheryyaml
#
# Fork of ahujasid/ableton-mcp adding a 33-personality style system, ~35 extra
# MCP tools, batch commands, and arrangement-view BETA. Published to PyPI as
# `ableton-mcp-lofifren`.

name: ableton-mcp-lofifren
version: "1.1.0"

startCommand:
  type: stdio
  configSchema:
    # JSON Schema defining the configuration options for the MCP.
    type: object
    properties: {}
  commandFunction: |-
    () => ({ command: "uvx", args: ["ableton-mcp-lofifren"] })
  exampleConfig: {}

# Smithery installs these into the runtime environment before launching the
# server above. Requires `ableton-mcp-lofifren` to be published to PyPI.
dependencies:
  python:
    - uv
    - ableton-mcp-lofifren
